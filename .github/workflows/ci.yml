name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Syntax check (api + lib)
        run: npm run check
      - name: Unit tests
        run: npm test

  deploy:
    # Auto-deploy to Vercel PRODUCTION on every push to main (i.e. a merged PR),
    # only after the test job passes. PRs are tested but NOT deployed.
    #
    # One-time setup: add a repo secret VERCEL_TOKEN
    #   (Vercel → Account Settings → Tokens; then GitHub → repo Settings →
    #    Secrets and variables → Actions → New repository secret).
    # The Org/Project IDs below are NOT secrets (they live in .vercel/project.json).
    # Until the secret is set, this job no-ops with a warning instead of failing.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_0zQt7XpGvVCqtvGOFedSH0lD
      VERCEL_PROJECT_ID: prj_6Zhh8vU7yHqNPyeArqBHAJuXnaWd
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret not set — skipping deploy. Add it in repo Settings → Secrets and variables → Actions to enable auto-deploy."
            exit 0
          fi
          npm i -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
