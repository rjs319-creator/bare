<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1628"/>
      <stop offset="1" stop-color="#060b14"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- candlesticks -->
  <g stroke-width="14" stroke-linecap="round">
    <line x1="150" y1="150" x2="150" y2="360" stroke="#10d98a"/>
    <rect x="128" y="200" width="44" height="120" rx="6" fill="#10d98a"/>
    <line x1="256" y1="120" x2="256" y2="392" stroke="#ff6b35"/>
    <rect x="234" y="170" width="44" height="170" rx="6" fill="#ff6b35"/>
    <line x1="362" y1="160" x2="362" y2="350" stroke="#10d98a"/>
    <rect x="340" y="180" width="44" height="110" rx="6" fill="#10d98a"/>
  </g>
  <!-- trend arrow -->
  <path d="M120 330 L210 250 L290 300 L400 180" fill="none" stroke="#06c4d4" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M360 180 L400 180 L400 220" fill="none" stroke="#06c4d4" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
